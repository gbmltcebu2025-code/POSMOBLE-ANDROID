name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: swiftpos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: swiftpos/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Add Android platform if missing
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Generate Android assets
        run: npx capacitor-assets generate --android

      - name: Patch AndroidManifest.xml
        run: |
          python3 << 'EOF'
          import re
          path = "android/app/src/main/AndroidManifest.xml"

          with open(path, "r") as f:
              content = f.read()

          permissions = [
              '<uses-permission android:name="android.permission.CAMERA" />',
              '<uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />',
              '<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />'
          ]

          for permission in permissions:
              if permission not in content:
                  content = re.sub(
                      r'(<manifest[^>]*>)',
                      r'\1\n    ' + permission,
                      content,
                      count=1
                  )

          meta = '<meta-data android:name="com.google.mlkit.vision.DEPENDENCIES" android:value="barcode_ui" />'

          if meta not in content:
              content = re.sub(
                  r'(<application[^>]*>)',
                  r'\1\n        ' + meta,
                  content,
                  count=1
              )

          with open(path, "w") as f:
              f.write(content)

          print("AndroidManifest.xml updated.")
          EOF

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: swiftpos/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SwiftPOS-debug-apk
          path: swiftpos/android/app/build/outputs/apk/debug/app-debug.apk
